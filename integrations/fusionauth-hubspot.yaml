naftiko: 1.0.0-alpha2
info:
  label: Push FusionAuth registrations into HubSpot contacts and lifecycle
  description: When a FusionAuth user registers for an application, upsert the matching HubSpot Contact and set lifecycle stage to "product qualified lead" so marketing automation, sequences, and lead scoring stay in step with real signups instead of stale form fills.
  tags:
  - FusionAuth
  - Integration
  - CRM
  - hubspot
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    FUSIONAUTH_API_KEY: FUSIONAUTH_API_KEY
    HUBSPOT_API_KEY: HUBSPOT_API_KEY
capability:
  consumes:
  - type: http
    namespace: fusionauth
    baseUri: https://your-fusionauth-host/api
    description: FusionAuth API operations consumed by this integration.
    resources:
    - name: api-user-userid
      path: /api/user/{userId}
      operations:
      - name: getuser
        method: GET
        description: Get the FusionAuth user record.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userId
          in: path
          type: string
          description: Path parameter userId.
          required: true
    - name: api-application-applicationid
      path: /api/application/{applicationId}
      operations:
      - name: getapplication
        method: GET
        description: Resolve the FusionAuth application for lifecycle mapping.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: applicationId
          in: path
          type: string
          description: Path parameter applicationId.
          required: true
  - type: http
    namespace: hubspot
    baseUri: https://api.hubapi.com
    description: HubSpot CRM API operations consumed by this integration.
    resources:
    - name: crm-v3-objects-contacts
      path: /crm/v3/objects/contacts
      operations:
      - name: createorupdatecontact
        method: POST
        description: 'HubSpot CRM API: createOrUpdateContact'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: crm-v3-objects-contacts-id
      path: /crm/v3/objects/contacts/{id}
      operations:
      - name: updatecontact
        method: PATCH
        description: 'HubSpot CRM API: updateContact'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Path parameter id.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: fusionauth-hubspot-mcp
    description: MCP adapter for the fusionauth-hubspot integration.
    tools:
    - name: fusionauth_hubspot
      description: Execute the fusionauth hubspot integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: fusionauth-hubspot-rest
    port: 8080
    description: REST adapter for the fusionauth-hubspot integration.
    resources:
    - path: /fusionauth-hubspot
      name: fusionauth-hubspot
      description: REST surface for the fusionauth-hubspot integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the fusionauth-hubspot integration.
        call: fusionauth_hubspot
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
