naftiko: 1.0.0-alpha2
info:
  label: Sync FusionAuth users to Salesforce contacts
  description: When a FusionAuth user registers, verifies email, or updates profile, upsert the corresponding Salesforce Contact by email so reps see signup, MFA enrollment, and last-login signal directly in the timeline without standing up a custom auth-event bus.
  tags:
  - FusionAuth
  - Integration
  - CRM
  - salesforce
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    FUSIONAUTH_API_KEY: FUSIONAUTH_API_KEY
    SALESFORCE_API_KEY: SALESFORCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: fusionauth
    baseUri: https://your-fusionauth-host/api
    description: FusionAuth API operations consumed by this integration.
    resources:
    - name: api-user-userid
      path: /api/user/{userId}
      operations:
      - name: getuser
        method: GET
        description: Retrieve the FusionAuth user driving the sync.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userId
          in: path
          type: string
          description: Path parameter userId.
          required: true
    - name: api-user-registration-userid-applicationid
      path: /api/user/registration/{userId}/{applicationId}
      operations:
      - name: getregistration
        method: GET
        description: Read the user's application registration for role/role-grant context.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userId
          in: path
          type: string
          description: Path parameter userId.
          required: true
        - name: applicationId
          in: path
          type: string
          description: Path parameter applicationId.
          required: true
  - type: http
    namespace: salesforce
    baseUri: https://yourinstance.my.salesforce.com
    description: Salesforce REST API operations consumed by this integration.
    resources:
    - name: services-data-v60-0-sobjects-contact
      path: /services/data/v60.0/sobjects/Contact
      operations:
      - name: createcontact
        method: POST
        description: 'Salesforce REST API: createContact'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: services-data-v60-0-sobjects-contact-id
      path: /services/data/v60.0/sobjects/Contact/{id}
      operations:
      - name: updatecontact
        method: PATCH
        description: 'Salesforce REST API: updateContact'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Path parameter id.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: fusionauth-salesforce-mcp
    description: MCP adapter for the fusionauth-salesforce integration.
    tools:
    - name: fusionauth_salesforce
      description: Execute the fusionauth salesforce integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: fusionauth-salesforce-rest
    port: 8080
    description: REST adapter for the fusionauth-salesforce integration.
    resources:
    - path: /fusionauth-salesforce
      name: fusionauth-salesforce
      description: REST surface for the fusionauth-salesforce integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the fusionauth-salesforce integration.
        call: fusionauth_salesforce
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
