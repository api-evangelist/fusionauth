naftiko: 1.0.0-alpha2
info:
  label: Promote FusionAuth users to Stripe customers
  description: When a FusionAuth user is created or registers for a paid application, upsert the matching Stripe Customer (keyed on email) and stash the Stripe customer ID back onto the FusionAuth user so billing, dunning, and revenue reporting stay reconciled to one identity.
  tags:
  - FusionAuth
  - Integration
  - Billing
  - stripe
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    FUSIONAUTH_API_KEY: FUSIONAUTH_API_KEY
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: fusionauth
    baseUri: https://your-fusionauth-host/api
    description: FusionAuth API operations consumed by this integration.
    resources:
    - name: api-user-userid
      path: /api/user/{userId}
      operations:
      - name: getuser
        method: GET
        description: Retrieve a FusionAuth user by id.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userId
          in: path
          type: string
          description: Path parameter userId.
          required: true
    - name: api-user-userid
      path: /api/user/{userId}
      operations:
      - name: patchuser
        method: PATCH
        description: Patch a FusionAuth user to store the Stripe customer id in data.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userId
          in: path
          type: string
          description: Path parameter userId.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  - type: http
    namespace: stripe
    baseUri: https://api.stripe.com
    description: Stripe API operations consumed by this integration.
    resources:
    - name: v1-customers
      path: /v1/customers
      operations:
      - name: createcustomer
        method: POST
        description: 'Stripe API: createCustomer'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-customers-id
      path: /v1/customers/{id}
      operations:
      - name: updatecustomer
        method: POST
        description: 'Stripe API: updateCustomer'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Path parameter id.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: fusionauth-stripe-mcp
    description: MCP adapter for the fusionauth-stripe integration.
    tools:
    - name: fusionauth_stripe
      description: Execute the fusionauth stripe integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: fusionauth-stripe-rest
    port: 8080
    description: REST adapter for the fusionauth-stripe integration.
    resources:
    - path: /fusionauth-stripe
      name: fusionauth-stripe
      description: REST surface for the fusionauth-stripe integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the fusionauth-stripe integration.
        call: fusionauth_stripe
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
