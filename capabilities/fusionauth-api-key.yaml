    - name: fusionauth-updateapikeywithid
      description: Updates an API key with the given Id.
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: fusionauth-api-key.updateapikeywithid
      with:
        keyId: tools.keyId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
