      - name: patchidentityproviderwithid
        method: PATCH
        description: Updates, via PATCH, the identity provider with the given Id.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: identityProviderId
          in: path
          type: string
          description: The Id of the identity provider to update.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: retrieveidentityproviderwithid
        method: GET
        description: Retrieves the identity provider for the given Id or all the identity providers if the Id is null.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
