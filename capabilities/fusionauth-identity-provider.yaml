naftiko: 1.0.0-alpha2
info:
  label: FusionAuth API — Identity Provider
  description: 'FusionAuth API — Identity Provider. 17 operations. Lead operation: Retrieves one or more identity provider for the given type. For types such as Google, Facebook, Twitter and LinkedIn, only a single  identit. Self-contained Naftiko capability covering one business surface.'
  tags:
  - FusionAuth
  - Identity Provider
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    FUSIONAUTH_API_KEY: FUSIONAUTH_API_KEY
capability:
  consumes:
  - type: http
    namespace: fusionauth-identity-provider
    baseUri: http://localhost:9011
    description: FusionAuth API — Identity Provider business capability. Self-contained, no shared references.
    resources:
    - name: api-identity-provider
      path: /api/identity-provider
      operations:
      - name: createidentityprovider
        method: POST
        description: Creates an identity provider. You can optionally specify an Id for the identity provider, if not provided one will be generated.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: retrieveidentityproviderbytypewithid
        method: GET
        description: Retrieves one or more identity provider for the given type. For types such as Google, Facebook, Twitter and LinkedIn, only a single  identit
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: type
          in: query
          type: string
          description: The type of the identity provider.
    - name: api-identity-provider-link
      path: /api/identity-provider/link
      operations:
      - name: createuserlinkwithid
        method: POST
        description: Link an external user from a 3rd party identity provider to a FusionAuth user.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deleteuserlinkwithid
        method: DELETE
        description: Remove an existing link that has been made from a 3rd party identity provider to a FusionAuth user.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: identityProviderId
          in: query
          type: string
          description: The unique Id of the identity provider.
        - name: identityProviderUserId
          in: query
          type: string
          description: The unique Id of the user in the 3rd party identity provider to unlink.
        - name: userId
          in: query
          type: string
          description: The unique Id of the FusionAuth user to unlink.
      - name: retrieveidentityproviderlink
        method: GET
        description: Retrieve all Identity Provider users (links) for the user. Specify the optional identityProviderId to retrieve links for a particular IdP. O
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: identityProviderId
          in: query
          type: string
          description: The unique Id of the identity provider. Specify this value to reduce the links returned to those for a particular IdP.
        - name: userId
          in: query
          type: string
          description: The unique Id of the user.
        - name: identityProviderUserId
          in: query
          type: string
          description: The unique Id of the user in the 3rd party identity provider.
    - name: api-identity-provider-link-pending-pendinglinkid
      path: /api/identity-provider/link/pending/{pendingLinkId}
      operations:
      - name: retrievependinglinkwithid
        method: GET
        description: Retrieve a pending identity provider link. This is useful to validate a pending link and retrieve meta-data about the identity provider link
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userId
          in: query
          type: string
          description: The optional userId. When provided additional meta-data will be provided to identify how many links if any the user already has.
        - name: pendingLinkId
          in: path
          type: string
          description: The pending link Id.
          required: true
    - name: api-identity-provider-login
      path: /api/identity-provider/login
      operations:
      - name: identityproviderloginwithid
        method: POST
        description: Handles login via third-parties including Social login, external OAuth and OpenID Connect, and other login systems.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-FusionAuth-TenantId
          in: header
          type: string
          description: The unique Id of the tenant used to scope this API request. Only required when there is more than one tenant and the API key is not tenant-scoped.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-identity-provider-lookup
      path: /api/identity-provider/lookup
      operations:
      - name: retrieveidentityproviderlookup
        method: GET
        description: Retrieves the identity provider for the given domain and tenantId. A 200 response code indicates the domain is managed by a registered ident
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: domain
          in: query
          type: string
          description: The domain or email address to lookup.
        - name: tenantId
          in: query
          type: string
          description: If provided, the API searches for an identity provider scoped to the corresponding tenant that manages the requested domain. If no result is found, the API then searches for global identity providers.
    - name: api-identity-provider-search
      path: /api/identity-provider/search
      operations:
      - name: searchidentityproviderswithid
        method: POST
        description: Searches identity providers with the specified criteria and pagination.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-identity-provider-start
      path: /api/identity-provider/start
      operations:
      - name: startidentityproviderloginwithid
        method: POST
        description: Begins a login request for a 3rd party login that requires user interaction such as HYPR.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-identity-provider-test
      path: /api/identity-provider/test
      operations:
      - name: retrieveidentityproviderconnectiontestresultswithid
        method: GET
        description: Retrieves the results for an identity provider connection test.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: connectionTestId
          in: query
          type: string
          description: The connection test id to retrieve results for.
      - name: startidentityproviderconnectiontestwithid
        method: POST
        description: Begins an identity provider connection test.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-identity-provider-identityproviderid
      path: /api/identity-provider/{identityProviderId}
