          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-key-import-keyid
      path: /api/key/import/{keyId}
      operations:
      - name: importkeywithid
        method: POST
        description: Import an existing RSA or EC key pair or an HMAC secret.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
