    description: FusionAuth API — Key business capability. Self-contained, no shared references.
    resources:
    - name: api-key
      path: /api/key
      operations:
      - name: retrievekeyswithid
        method: GET
        description: Retrieves all the keys.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
    - name: api-key-generate
      path: /api/key/generate
      operations:
      - name: generatekey
        method: POST
        description: Generate a new RSA or EC key pair or an HMAC secret.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-key-generate-keyid
      path: /api/key/generate/{keyId}
      operations:
      - name: generatekeywithid
        method: POST
        description: Generate a new RSA or EC key pair or an HMAC secret.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: keyId
          in: path
          type: string
          description: The Id for the key. If not provided a secure random UUID will be generated.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-key-import
