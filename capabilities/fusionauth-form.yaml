naftiko: 1.0.0-alpha2
info:
  label: FusionAuth API — Form
  description: 'FusionAuth API — Form. 12 operations. Lead operation: Retrieves the form field with the given Id.. Self-contained Naftiko capability covering one business surface.'
  tags:
  - FusionAuth
  - Form
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    FUSIONAUTH_API_KEY: FUSIONAUTH_API_KEY
capability:
  consumes:
  - type: http
    namespace: fusionauth-form
    baseUri: http://localhost:9011
    description: FusionAuth API — Form business capability. Self-contained, no shared references.
    resources:
    - name: api-form
      path: /api/form
      operations:
      - name: createform
        method: POST
        description: Creates a form.  You can optionally specify an Id for the form, if not provided one will be generated.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-form-field
      path: /api/form/field
      operations:
      - name: createformfield
        method: POST
        description: Creates a form field.  You can optionally specify an Id for the form, if not provided one will be generated.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-form-field-fieldid
      path: /api/form/field/{fieldId}
      operations:
      - name: createformfieldwithid
        method: POST
        description: Creates a form field.  You can optionally specify an Id for the form, if not provided one will be generated.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fieldId
          in: path
          type: string
          description: The Id for the form field. If not provided a secure random UUID will be generated.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deleteformfieldwithid
        method: DELETE
        description: Deletes the form field for the given Id.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fieldId
          in: path
          type: string
          description: The Id of the form field to delete.
          required: true
      - name: patchformfieldwithid
        method: PATCH
        description: Patches the form field with the given Id.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fieldId
          in: path
          type: string
          description: The Id of the form field to patch.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: retrieveformfieldwithid
        method: GET
        description: Retrieves the form field with the given Id.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fieldId
          in: path
          type: string
          description: The Id of the form field.
          required: true
      - name: updateformfieldwithid
        method: PUT
        description: Updates the form field with the given Id.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fieldId
          in: path
          type: string
          description: The Id of the form field to update.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-form-formid
      path: /api/form/{formId}
      operations:
      - name: createformwithid
        method: POST
        description: Creates a form.  You can optionally specify an Id for the form, if not provided one will be generated.
        outputRawFormat: json
        outputParameters:
