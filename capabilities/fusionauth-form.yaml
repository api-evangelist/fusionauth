          type: object
          value: $.
        inputParameters:
        - name: formId
          in: path
          type: string
          description: The Id for the form. If not provided a secure random UUID will be generated.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deleteformwithid
        method: DELETE
        description: Deletes the form for the given Id.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: formId
          in: path
          type: string
          description: The Id of the form to delete.
          required: true
      - name: patchformwithid
        method: PATCH
        description: Patches the form with the given Id.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: formId
          in: path
          type: string
          description: The Id of the form to patch.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: retrieveformwithid
        method: GET
        description: Retrieves the form with the given Id.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: formId
          in: path
          type: string
          description: The Id of the form.
          required: true
      - name: updateformwithid
        method: PUT
        description: Updates the form with the given Id.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: formId
          in: path
          type: string
          description: The Id of the form to update.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
