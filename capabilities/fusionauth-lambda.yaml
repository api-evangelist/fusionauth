naftiko: 1.0.0-alpha2
info:
  label: FusionAuth API — Lambda
  description: 'FusionAuth API — Lambda. 8 operations. Lead operation: Retrieves all the lambdas for the provided type.. Self-contained Naftiko capability covering one business surface.'
  tags:
  - FusionAuth
  - Lambda
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    FUSIONAUTH_API_KEY: FUSIONAUTH_API_KEY
capability:
  consumes:
  - type: http
    namespace: fusionauth-lambda
    baseUri: http://localhost:9011
    description: FusionAuth API — Lambda business capability. Self-contained, no shared references.
    resources:
    - name: api-lambda
      path: /api/lambda
      operations:
      - name: createlambda
        method: POST
        description: Creates a Lambda. You can optionally specify an Id for the lambda, if not provided one will be generated.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: retrievelambdasbytypewithid
        method: GET
        description: Retrieves all the lambdas for the provided type.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: type
          in: query
          type: string
          description: The type of the lambda to return.
    - name: api-lambda-search
      path: /api/lambda/search
      operations:
      - name: searchlambdaswithid
        method: POST
        description: Searches lambdas with the specified criteria and pagination.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-lambda-lambdaid
      path: /api/lambda/{lambdaId}
      operations:
      - name: createlambdawithid
        method: POST
        description: Creates a Lambda. You can optionally specify an Id for the lambda, if not provided one will be generated.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: lambdaId
          in: path
          type: string
          description: The Id for the lambda. If not provided a secure random UUID will be generated.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deletelambdawithid
        method: DELETE
        description: Deletes the lambda for the given Id.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: lambdaId
          in: path
          type: string
          description: The Id of the lambda to delete.
          required: true
      - name: patchlambdawithid
        method: PATCH
        description: Updates, via PATCH, the lambda with the given Id.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: lambdaId
          in: path
          type: string
          description: The Id of the lambda to update.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: retrievelambdawithid
        method: GET
        description: Retrieves the lambda for the given Id.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: lambdaId
          in: path
          type: string
          description: The Id of the lambda.
          required: true
      - name: updatelambdawithid
        method: PUT
        description: Updates the lambda with the given Id.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: lambdaId
          in: path
          type: string
          description: The Id of the lambda to update.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: fusionauth-lambda-rest
    port: 8080
    description: REST adapter for FusionAuth API — Lambda. One resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/api/lambda
      name: api-lambda
      description: REST surface for api-lambda.
      operations:
      - method: POST
        name: createlambda
        description: Creates a Lambda. You can optionally specify an Id for the lambda, if not provided one will be generated.
        call: fusionauth-lambda.createlambda
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: retrievelambdasbytypewithid
        description: Retrieves all the lambdas for the provided type.
        call: fusionauth-lambda.retrievelambdasbytypewithid
        with:
          type: rest.type
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/lambda/search
      name: api-lambda-search
      description: REST surface for api-lambda-search.
      operations:
      - method: POST
        name: searchlambdaswithid
        description: Searches lambdas with the specified criteria and pagination.
        call: fusionauth-lambda.searchlambdaswithid
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/lambda/{lambdaId}
      name: api-lambda-lambdaid
      description: REST surface for api-lambda-lambdaid.
      operations:
      - method: POST
        name: createlambdawithid
        description: Creates a Lambda. You can optionally specify an Id for the lambda, if not provided one will be generated.
        call: fusionauth-lambda.createlambdawithid
        with:
          lambdaId: rest.lambdaId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletelambdawithid
        description: Deletes the lambda for the given Id.
        call: fusionauth-lambda.deletelambdawithid
        with:
          lambdaId: rest.lambdaId
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: patchlambdawithid
        description: Updates, via PATCH, the lambda with the given Id.
        call: fusionauth-lambda.patchlambdawithid
        with:
          lambdaId: rest.lambdaId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: retrievelambdawithid
        description: Retrieves the lambda for the given Id.
        call: fusionauth-lambda.retrievelambdawithid
        with:
          lambdaId: rest.lambdaId
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatelambdawithid
        description: Updates the lambda with the given Id.
        call: fusionauth-lambda.updatelambdawithid
        with:
          lambdaId: rest.lambdaId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: fusionauth-lambda-mcp
    port: 9090
    transport: http
    description: MCP adapter for FusionAuth API — Lambda. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: fusionauth-createlambda
      description: Creates a Lambda. You can optionally specify an Id for the lambda, if not provided one will be generated.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: fusionauth-lambda.createlambda
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: fusionauth-retrievelambdasbytypewithid
      description: Retrieves all the lambdas for the provided type.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fusionauth-lambda.retrievelambdasbytypewithid
      with:
        type: tools.type
      outputParameters:
      - type: object
        mapping: $.
    - name: fusionauth-searchlambdaswithid
      description: Searches lambdas with the specified criteria and pagination.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: fusionauth-lambda.searchlambdaswithid
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: fusionauth-createlambdawithid
      description: Creates a Lambda. You can optionally specify an Id for the lambda, if not provided one will be generated.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: fusionauth-lambda.createlambdawithid
      with:
        lambdaId: tools.lambdaId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: fusionauth-deletelambdawithid
      description: Deletes the lambda for the given Id.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: fusionauth-lambda.deletelambdawithid
      with:
        lambdaId: tools.lambdaId
      outputParameters:
      - type: object
        mapping: $.
    - name: fusionauth-patchlambdawithid
      description: Updates, via PATCH, the lambda with the given Id.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: fusionauth-lambda.patchlambdawithid
      with:
        lambdaId: tools.lambdaId
        body: tools.body
      outputParameters:
      - type: object
