        name: retrievetenantwithid
        description: Retrieves the tenant for the given Id.
        call: fusionauth-tenant.retrievetenantwithid
        with:
          tenantId: rest.tenantId
          X-FusionAuth-TenantId: rest.X-FusionAuth-TenantId
        outputParameters:
        - type: object
          mapping: $.
