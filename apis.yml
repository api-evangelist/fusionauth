aid: fusionauth
name: FusionAuth
type: Index
description: >-
  FusionAuth is a developer-focused customer identity and access management
  (CIAM) platform that delivers authentication, authorization, registration,
  multi-factor authentication, single sign-on, OAuth2 and OpenID Connect, and
  user management capabilities through a comprehensive REST API and
  self-hostable identity service.
